<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18Otaku - Anime Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'accent': '#ff4444',
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .line-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: #ff4444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff6666;
        }

        /* Hero Section */
        .anime-hero {
            position: relative;
            width: 100%;
            height: 500px;
            background: #000;
            overflow: hidden;
            margin-top: 60px;
        }

        .anime-hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.7;
        }

        .anime-hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            z-index: 5;
        }

        .anime-hero-content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 3rem 2rem;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
        }

        .anime-hero-left {
            flex: 1;
            max-width: 600px;
            color: white;
        }

        .anime-hero-right {
            flex: 0 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 2rem;
        }

        .anime-poster-large {
            width: 260px;
            height: 380px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(255, 68, 68, 0.4);
            border: 2px solid rgba(255, 68, 68, 0.3);
            flex-shrink: 0;
            background: #1a1a1a;
        }

        .anime-poster-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .anime-title-main {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .anime-title-sub {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 1.5rem;
        }

        .anime-meta-info {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .meta-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meta-value {
            font-size: 1rem;
            color: white;
            font-weight: 600;
        }

        .meta-value.accent {
            color: #ff4444;
        }

        .anime-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .anime-btn {
            padding: 12px 32px;
            border-radius: 6px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .anime-btn-primary {
            background: #ff4444;
            color: white;
        }

        .anime-btn-primary:hover {
            background: #ff6666;
            transform: translateY(-2px);
        }

        .anime-btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .anime-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Content Section */
        .anime-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 3rem;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .content-section {
            color: white;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #ff4444;
        }

        .description-text {
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.8;
            font-size: 1rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .genre-tags {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .genre-tag {
            padding: 0.5rem 1rem;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 20px;
            color: #ff4444;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .cast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .cast-item {
            text-align: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .cast-item:hover {
            background: rgba(255, 68, 68, 0.1);
            border-color: rgba(255, 68, 68, 0.3);
        }

        .cast-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .cast-role {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .sidebar-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            color: white;
            backdrop-filter: blur(10px);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: rgba(255, 255, 255, 0.6);
        }

        .info-value {
            color: #ff4444;
            font-weight: 600;
            text-align: right;
        }

        .rating-bar {
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .rating-fill {
            background: #ff4444;
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .episodes-list {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .episode-item {
            padding: 0.75rem;
            background: rgba(255, 68, 68, 0.05);
            border: 1px solid rgba(255, 68, 68, 0.2);
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .episode-item:hover {
            background: rgba(255, 68, 68, 0.15);
            border-color: rgba(255, 68, 68, 0.4);
            transform: translateX(4px);
        }

        .episode-item.active {
            background: rgba(255, 68, 68, 0.2);
            border-color: #ff4444;
            font-weight: 600;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ff4444;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            color: #ff4444;
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .anime-hero {
                height: 400px;
            }

            .anime-hero-content {
                padding: 2rem 1rem;
            }

            .anime-hero-left {
                max-width: 400px;
            }

            .anime-hero-right {
                margin-left: 1rem;
            }

            .anime-poster-large {
                width: 220px;
                height: 320px;
            }

            .anime-title-main {
                font-size: 2rem;
            }

            .content-grid {
                grid-template-columns: 1fr 300px;
                gap: 2rem;
            }

            .anime-content {
                padding: 2rem 1rem;
            }
        }

        @media (max-width: 768px) {
            .anime-hero {
                height: auto;
                min-height: 450px;
            }

            .anime-hero-content {
                flex-direction: column;
                gap: 2rem;
                padding: 2rem 1rem;
            }

            .anime-hero-left {
                max-width: 100%;
                text-align: center;
            }

            .anime-hero-right {
                margin-left: 0;
            }

            .anime-title-main {
                font-size: 1.75rem;
            }

            .anime-meta-info {
                justify-content: center;
                gap: 1rem;
            }

            .anime-buttons {
                justify-content: center;
                flex-direction: column;
            }

            .anime-btn {
                width: 100%;
                justify-content: center;
            }

            .content-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .anime-content {
                padding: 2rem 1rem;
            }

            .cast-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .sidebar {
                order: -1;
            }
        }

        @media (max-width: 480px) {
            .anime-hero {
                min-height: 400px;
            }

            .anime-poster-large {
                width: 180px;
                height: 270px;
            }

            .anime-title-main {
                font-size: 1.5rem;
            }

            .anime-title-sub {
                font-size: 0.9rem;
            }

            .meta-item {
                min-width: 80px;
            }

            .anime-btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            .cast-grid {
                grid-template-columns: 1fr;
            }

            .section-title {
                font-size: 1.25rem;
            }

            .description-text {
                font-size: 0.9rem;
            }

            .anime-meta-info {
                gap: 0.75rem;
            }

            .meta-item {
                min-width: auto;
            }

            .meta-label {
                font-size: 0.75rem;
            }

            .meta-value {
                font-size: 0.9rem;
            }
        }

        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.1) 25%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.1) 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .no-data {
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body class="scroll-smooth">
    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Anime Hero Section -->
    <section class="anime-hero">
        <div id="anime-hero-bg" class="anime-hero-bg"></div>
        <div class="anime-hero-overlay"></div>
        <div class="anime-hero-content">
            <div class="anime-hero-left">
                <h1 class="anime-title-main" id="anime-title">Loading...</h1>
                <p class="anime-title-sub" id="anime-subtitle"></p>
                
                <div class="anime-meta-info">
                    <div class="meta-item">
                        <span class="meta-label">Score</span>
                        <span class="meta-value accent" id="anime-score">-</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">Episodes</span>
                        <span class="meta-value" id="anime-episodes">-</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">Status</span>
                        <span class="meta-value" id="anime-status">-</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">Type</span>
                        <span class="meta-value" id="anime-type">-</span>
                    </div>
                </div>

                <div class="anime-buttons">
                    <button class="anime-btn anime-btn-primary" id="watch-btn">
                        ▶ Watch Now
                    </button>
                    <button class="anime-btn anime-btn-secondary" id="add-to-list-btn">
                        ♡ Add to List
                    </button>
                </div>
            </div>

            <div class="anime-hero-right">
                <div class="anime-poster-large">
                    <img id="anime-poster" src="" alt="Anime Poster" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
            </div>
        </div>
    </section>

    <div class="px-6 max-w-7xl mx-auto"><div class="line-divider"></div></div>

    <!-- Main Content -->
    <section class="anime-content">
        <div class="content-grid">
            <!-- Left Column -->
            <div class="main-content">
                <!-- Description -->
                <div class="content-section">
                    <h2 class="section-title">Synopsis</h2>
                    <p class="description-text" id="anime-description">Loading description...</p>
                </div>

                <!-- Genres -->
                <div class="content-section">
                    <h2 class="section-title">Genres</h2>
                    <div class="genre-tags" id="anime-genres"></div>
                </div>

                <!-- Characters & Voice Actors -->
                <div class="content-section">
                    <h2 class="section-title">Main Characters</h2>
                    <div class="cast-grid" id="anime-cast"></div>
                </div>
            </div>

            <!-- Right Sidebar -->
            <div class="sidebar">
                <!-- Info Card -->
                <div class="sidebar-card">
                    <div class="card-title">📊 Information</div>
                    <div class="card-content">
                        <div class="info-row">
                            <span class="info-label">Year</span>
                            <span class="info-value" id="info-year">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Season</span>
                            <span class="info-value" id="info-season">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Studio</span>
                            <span class="info-value" id="info-studio">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Source</span>
                            <span class="info-value" id="info-source">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Popularity</span>
                            <span class="info-value" id="info-popularity">-</span>
                        </div>
                    </div>
                </div>

                <!-- Rating Card -->
                <div class="sidebar-card">
                    <div class="card-title">⭐ Rating</div>
                    <div class="card-content">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                            <span style="font-size: 2rem; font-weight: 700; color: #ff4444;" id="rating-score">-</span>
                            <span style="color: rgba(255,255,255,0.6);">/10</span>
                        </div>
                        <div class="rating-bar">
                            <div class="rating-fill" id="rating-bar"></div>
                        </div>
                        <span style="font-size: 0.8rem; color: rgba(255,255,255,0.6);" id="rating-count">Based on votes</span>
                    </div>
                </div>

                <!-- Episodes Card -->
                <div class="sidebar-card">
                    <div class="card-title">📺 Episodes</div>
                    <div class="episodes-list" id="episodes-list">
                        <div style="padding: 1rem; text-align: center;">
                            <div class="loading-spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="px-6 max-w-7xl mx-auto"><div class="line-divider"></div></div>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <script>
        async function loadHeader() {
            try {
                const response = await fetch('header.html');
                document.getElementById('header-container').innerHTML = await response.text();
            } catch (error) {
                console.error('Error loading header:', error);
            }
        }

        async function loadFooter() {
            try {
                const response = await fetch('footer.html');
                document.getElementById('footer-container').innerHTML = await response.text();
            } catch (error) {
                console.error('Error loading footer:', error);
            }
        }

        async function queryAniList(query, variables = {}) {
            try {
                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, variables })
                });

                const data = await response.json();
                if (data.errors) {
                    console.error('AniList errors:', data.errors);
                    return null;
                }
                return data.data;
            } catch (error) {
                console.error('AniList error:', error);
                return null;
            }
        }

        async function getAnimeDetails(malId) {
            const query = `
                query($malId: Int) {
                    Media(idMal: $malId, type: ANIME) {
                        id
                        idMal
                        title {
                            romaji
                            english
                            native
                        }
                        description
                        coverImage {
                            large
                            medium
                        }
                        bannerImage
                        averageScore
                        popularity
                        episodes
                        status
                        type
                        season
                        seasonYear
                        genres
                        studios(isMain: true) {
                            nodes {
                                name
                            }
                        }
                        source
                        characters(role: MAIN, perPage: 6) {
                            edges {
                                node {
                                    name {
                                        full
                                    }
                                    image {
                                        medium
                                    }
                                }
                                voiceActors(language: JAPANESE) {
                                    name {
                                        full
                                    }
                                }
                            }
                        }
                    }
                }
            `;

            return await queryAniList(query, { malId: parseInt(malId) });
        }

        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function sanitizeHTML(text) {
            if (!text) return 'No description available';
            const div = document.createElement('div');
            div.innerHTML = text;
            return div.textContent || div.innerText || '';
        }

        async function init() {
            loadHeader();
            loadFooter();

            const malId = getQueryParam('mal_id');
            if (!malId) {
                document.getElementById('anime-title').textContent = 'Error: No anime ID provided';
                return;
            }

            const data = await getAnimeDetails(malId);
            if (!data?.Media) {
                document.getElementById('anime-title').textContent = 'Anime not found';
                document.querySelector('.anime-content').innerHTML = '<div class="error-message">Sorry, this anime could not be found.</div>';
                return;
            }

            const anime = data.Media;
            console.log('📺 Anime loaded:', anime.title.romaji);

            // Hero Section
            if (anime.bannerImage) {
                document.getElementById('anime-hero-bg').style.backgroundImage = `url('${anime.bannerImage}')`;
            } else if (anime.coverImage?.large) {
                document.getElementById('anime-hero-bg').style.backgroundImage = `url('${anime.coverImage.large}')`;
            }

            const posterUrl = anime.coverImage?.large || anime.coverImage?.medium;
            if (posterUrl) {
                document.getElementById('anime-poster').src = posterUrl;
            }
            
            const title = anime.title.romaji || anime.title.english || anime.title.native || 'Unknown';
            document.getElementById('anime-title').textContent = title;
            document.title = `${title} - 18Otaku`;
            
            const subtitle = anime.title.english || anime.title.native;
            if (subtitle && subtitle !== title) {
                document.getElementById('anime-subtitle').textContent = subtitle;
            }
            
            const score = anime.averageScore ? (anime.averageScore / 10).toFixed(1) : 'N/A';
            document.getElementById('anime-score').textContent = score;
            document.getElementById('anime-episodes').textContent = anime.episodes || 'Unknown';
            document.getElementById('anime-status').textContent = (anime.status || 'Unknown').replace(/_/g, ' ');
            document.getElementById('anime-type').textContent = anime.type || '-';

            // Description
            const description = sanitizeHTML(anime.description);
            document.getElementById('anime-description').textContent = description.substring(0, 800) + (description.length > 800 ? '...' : '');

            // Genres
            const genresContainer = document.getElementById('anime-genres');
            genresContainer.innerHTML = '';
            if (anime.genres && anime.genres.length > 0) {
                anime.genres.slice(0, 12).forEach(genre => {
                    const tag = document.createElement('span');
                    tag.className = 'genre-tag';
                    tag.textContent = genre;
                    genresContainer.appendChild(tag);
                });
            } else {
                genresContainer.innerHTML = '<span class="no-data">No genres available</span>';
            }

            // Characters
            const castContainer = document.getElementById('anime-cast');
            castContainer.innerHTML = '';
            if (anime.characters?.edges && anime.characters.edges.length > 0) {
                anime.characters.edges.forEach(edge => {
                    const char = edge.node;
                    const voice = edge.voiceActors?.[0]?.name?.full || 'Voice Actor';
                    
                    const castItem = document.createElement('div');
                    castItem.className = 'cast-item';
                    castItem.innerHTML = `
                        <div class="cast-name">${char.name?.full || 'Unknown'}</div>
                        <div class="cast-role">${voice}</div>
                    `;
                    castContainer.appendChild(castItem);
                });
            } else {
                castContainer.innerHTML = '<div class="no-data">No cast information available</div>';
            }

            // Sidebar Info
            document.getElementById('info-year').textContent = anime.seasonYear || '-';
            
            let seasonText = '-';
            if (anime.season) {
                const seasonMap = { 'WINTER': 'Winter', 'SPRING': 'Spring', 'SUMMER': 'Summer', 'FALL': 'Fall' };
                seasonText = seasonMap[anime.season] || anime.season;
            }
            document.getElementById('info-season').textContent = seasonText;
            
            document.getElementById('info-studio').textContent = anime.studios?.nodes?.[0]?.name || '-';
            document.getElementById('info-source').textContent = (anime.source || '-').replace(/_/g, ' ');
            document.getElementById('info-popularity').textContent = anime.popularity ? `#${anime.popularity}` : '-';

            // Rating
            document.getElementById('rating-score').textContent = score;
            if (anime.averageScore) {
                document.getElementById('rating-bar').style.width = `${anime.averageScore}%`;
            }

            // Episodes List
            const episodesList = document.getElementById('episodes-list');
            episodesList.innerHTML = '';
            const episodeCount = anime.episodes || 12;
            
            if (episodeCount > 0) {
                for (let i = 1; i <= Math.min(episodeCount, 50); i++) {
                    const episodeItem = document.createElement('div');
                    episodeItem.className = 'episode-item' + (i === 1 ? ' active' : '');
                    episodeItem.textContent = `Episode ${i}`;
                    episodeItem.onclick = () => {
                        document.querySelectorAll('.episode-item').forEach(e => e.classList.remove('active'));
                        episodeItem.classList.add('active');
                        console.log(`Selected: Episode ${i}`);
                    };
                    episodesList.appendChild(episodeItem);
                }
            } else {
                episodesList.innerHTML = '<div class="no-data">Episode information not available</div>';
            }

            // Buttons
            document.getElementById('watch-btn').onclick = () => {
                alert(`▶ Video player would open for "${title}" - Episode 1\n\n(Feature coming soon)`);
            };

            document.getElementById('add-to-list-btn').onclick = () => {
                alert(`✓ Added "${title}" to your list!\n\n(Feature coming soon)`);
            };
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
