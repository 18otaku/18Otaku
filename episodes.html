<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18Otaku - Episodes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'accent': '#ff4444',
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .line-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: #ff4444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff6666;
        }

        /* Header Section */
        .episodes-header {
            position: relative;
            width: 100%;
            height: 300px;
            background: #000;
            overflow: hidden;
            margin-top: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .episodes-header-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.5;
        }

        .episodes-header-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%);
            z-index: 5;
        }

        .episodes-header-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
        }

        .episodes-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .episodes-count {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Content Section */
        .episodes-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        /* Episode Card */
        .episode-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            aspect-ratio: 16 / 9;
            background: #1a1a1a;
            cursor: pointer;
            transition: all 0.3s ease;
            group: hover;
        }

        .episode-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 68, 68, 0.2);
        }

        .episode-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .episode-card:hover img {
            transform: scale(1.1);
        }

        /* Badge - Uncensored */
        .uncensored-badge {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            background: #22c55e;
            color: white;
            padding: 0.375rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        /* Release Date - Top Right */
        .release-date {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.8);
            padding: 0.375rem 0.75rem;
            border-radius: 4px;
            font-size: 0.7rem;
            z-index: 20;
            backdrop-filter: blur(10px);
        }

        /* Episode Info - Bottom */
        .episode-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            padding: 1.5rem;
            z-index: 15;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100%;
        }

        .episode-title {
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            line-height: 1.3;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .episode-number {
            color: #ff4444;
            font-weight: 700;
            font-size: 0.85rem;
        }

        /* Loading Skeleton */
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.1) 25%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.1) 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .modal-title {
            color: white;
            font-size: clamp(0.9rem, 4vw, 1.5rem);
            font-weight: 700;
            flex: 1;
            word-break: break-word;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #ff4444;
            transform: scale(1.2);
        }

        .modal-body {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .no-data {
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
            text-align: center;
            padding: 3rem;
            font-size: 1.1rem;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ff4444;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .episodes-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }

            .episodes-title {
                font-size: 2rem;
            }
        }

        @media (max-width: 768px) {
            .episodes-header {
                height: 250px;
            }

            .episodes-title {
                font-size: 1.75rem;
            }

            .episodes-count {
                font-size: 0.9rem;
            }

            .episodes-content {
                padding: 2rem 1rem;
            }

            .episodes-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 0.75rem;
            }

            .episode-info {
                padding: 1rem;
            }

            .episode-title {
                font-size: 0.8rem;
            }

            .episode-number {
                font-size: 0.75rem;
            }

            .uncensored-badge {
                font-size: 0.65rem;
                padding: 0.25rem 0.5rem;
                top: 0.5rem;
                left: 0.5rem;
            }

            .release-date {
                font-size: 0.65rem;
                padding: 0.25rem 0.5rem;
                top: 0.5rem;
                right: 0.5rem;
            }

            .modal-content {
                width: 95%;
                max-height: 95vh;
            }
        }

        @media (max-width: 480px) {
            .episodes-header {
                height: 200px;
            }

            .episodes-title {
                font-size: 1.5rem;
            }

            .episodes-count {
                font-size: 0.85rem;
            }

            .episodes-content {
                padding: 1.5rem 1rem;
            }

            .episodes-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.5rem;
            }

            .episode-card {
                aspect-ratio: 9 / 16;
            }

            .episode-info {
                padding: 0.75rem;
            }

            .episode-title {
                font-size: 0.7rem;
                margin-bottom: 0.25rem;
            }

            .episode-number {
                font-size: 0.65rem;
            }

            .uncensored-badge {
                font-size: 0.6rem;
                padding: 0.2rem 0.4rem;
                top: 0.375rem;
                left: 0.375rem;
            }

            .release-date {
                font-size: 0.6rem;
                padding: 0.2rem 0.4rem;
                top: 0.375rem;
                right: 0.375rem;
            }

            .modal-header {
                padding: 0.75rem;
            }

            .modal-body {
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body class="scroll-smooth">
    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Episodes Header -->
    <section class="episodes-header">
        <div id="episodes-header-bg" class="episodes-header-bg"></div>
        <div class="episodes-header-overlay"></div>
        <div class="episodes-header-content">
            <div>
                <h1 class="episodes-title" id="episodes-anime-title">Loading...</h1>
                <p class="episodes-count"><span id="episodes-count">0</span> Episodes Available</p>
            </div>
        </div>
    </section>

    <div class="px-6 max-w-7xl mx-auto"><div class="line-divider"></div></div>

    <!-- Episodes Content -->
    <section class="episodes-content">
        <div class="episodes-grid" id="episodes-grid">
            <div class="episode-card shimmer"></div>
            <div class="episode-card shimmer"></div>
            <div class="episode-card shimmer"></div>
            <div class="episode-card shimmer"></div>
            <div class="episode-card shimmer"></div>
            <div class="episode-card shimmer"></div>
        </div>
    </section>

    <div class="px-6 max-w-7xl mx-auto"><div class="line-divider"></div></div>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <!-- Video Modal -->
    <div id="video-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-episode-title">Episode</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="video-container">
                    <iframe id="video-iframe" src="" allowfullscreen="" allow="autoplay" sandbox="allow-same-origin allow-scripts allow-presentation"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allEpisodes = [];
        let animeTitle = '';

        async function loadHeader() {
            try {
                const response = await fetch('header.html');
                document.getElementById('header-container').innerHTML = await response.text();
            } catch (error) {
                console.error('Error loading header:', error);
            }
        }

        async function loadFooter() {
            try {
                const response = await fetch('footer.html');
                document.getElementById('footer-container').innerHTML = await response.text();
            } catch (error) {
                console.error('Error loading footer:', error);
            }
        }

        function parseEpisodeInfo(title) {
            const match = title.match(/\[(\d+)-(\d+)\]\s*\[(.+?)\]\s*\[(.+?)\](?:\s*\[(.+?)\])?/);
            if (match) {
                return {
                    mal_id: match[1],
                    episode: parseInt(match[2]),
                    anime_title: match[3],
                    date: match[4],
                    uncensored: match[5] === 'Uncen'
                };
            }
            return null;
        }

        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            } catch (e) {
                return dateStr;
            }
        }

        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        async function fetchEpisodes(malId) {
            try {
                const response = await fetch('https://raw.githubusercontent.com/18otaku/streamtape-json/main/ha.json');
                const data = await response.json();
                
                const filtered = data.files.filter(file => file.mal_id == malId);
                return filtered.sort((a, b) => {
                    const infoA = parseEpisodeInfo(a.title);
                    const infoB = parseEpisodeInfo(b.title);
                    return (infoA?.episode || 0) - (infoB?.episode || 0);
                });
            } catch (error) {
                console.error('Error fetching episodes:', error);
                return [];
            }
        }

        function playEpisode(episode) {
            const episodeInfo = parseEpisodeInfo(episode.title);
            const title = episodeInfo ? `Episode ${episodeInfo.episode}${episodeInfo.uncensored ? ' (Uncen)' : ''}` : 'Episode';
            
            document.getElementById('modal-episode-title').textContent = title;
            
            const iframeSrc = `https://streamtape.to/e/${episode.vidcode}?color=255,68,68&disableads=1`;
            document.getElementById('video-iframe').src = iframeSrc;
            
            document.getElementById('video-modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('video-modal').classList.remove('show');
            document.getElementById('video-iframe').src = '';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('video-modal');
            if (event.target == modal) {
                closeModal();
            }
        }

        async function init() {
            loadHeader();
            loadFooter();

            const malId = getQueryParam('mal_id');
            if (!malId) {
                document.getElementById('episodes-anime-title').textContent = 'Error: No anime ID provided';
                return;
            }

            allEpisodes = await fetchEpisodes(malId);
            console.log('📹 Episodes loaded:', allEpisodes.length);

            if (allEpisodes.length === 0) {
                document.getElementById('episodes-grid').innerHTML = '<div class="no-data">No episodes available for this anime</div>';
                return;
            }

            const firstEpisodeInfo = parseEpisodeInfo(allEpisodes[0].title);
            animeTitle = firstEpisodeInfo?.anime_title || 'Anime Episodes';
            
            document.getElementById('episodes-anime-title').textContent = animeTitle;
            document.getElementById('episodes-count').textContent = allEpisodes.length;
            document.title = `${animeTitle} Episodes - 18Otaku`;

            // Set header background from first episode
            if (allEpisodes[0].title) {
                const firstInfo = parseEpisodeInfo(allEpisodes[0].title);
                if (firstInfo) {
                    // Using a placeholder since we don't have images in JSON
                    document.getElementById('episodes-header-bg').style.backgroundColor = '#1a1a1a';
                }
            }

            renderEpisodes();
        }

        function renderEpisodes() {
            const container = document.getElementById('episodes-grid');
            container.innerHTML = '';

            allEpisodes.forEach(episode => {
                const episodeInfo = parseEpisodeInfo(episode.title);
                if (!episodeInfo) return;

                const card = document.createElement('div');
                card.className = 'episode-card';
                
                const uncenseredBadge = episodeInfo.uncensored 
                    ? `<div class="uncensored-badge"><i class="fas fa-check"></i> Uncen</div>` 
                    : '';

                const releaseDate = formatDate(episodeInfo.date);

                card.innerHTML = `
                    ${uncenseredBadge}
                    <div class="release-date">${releaseDate}</div>
                    <img src="https://via.placeholder.com/320x180?text=Episode+${episodeInfo.episode}" alt="Episode ${episodeInfo.episode}" style="background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);">
                    <div class="episode-info">
                        <div class="episode-title">${episodeInfo.anime_title}</div>
                        <div class="episode-number">Episode ${episodeInfo.episode}</div>
                    </div>
                `;

                card.onclick = () => playEpisode(episode);
                container.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
