<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18Otaku - Anime Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'accent': '#ff4444',
                        'dark-glass': 'rgba(0, 0, 0, 0.4)',
                        'darker-glass': 'rgba(0, 0, 0, 0.6)',
                    },
                    backdropBlur: {
                        'xl': '20px',
                        '2xl': '30px',
                    },
                    backgroundImage: {
                        'gradient-to-bottom': 'linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8))',
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .glass-hover:hover {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .anime-poster {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            aspect-ratio: 3/4;
        }
        
        .anime-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .anime-poster:hover img {
            transform: scale(1.05);
        }
        
        .anime-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            padding: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .anime-poster:hover .anime-overlay {
            opacity: 1;
        }
        
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.1) 25%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.1) 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .section-title {
            position: relative;
            display: inline-block;
            padding-bottom: 0.75rem;
        }
        
        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #ff4444;
        }

        .line-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .scroll-smooth {
            scroll-behavior: smooth;
        }

        @supports (backdrop-filter: blur(20px)) {
            .glass {
                background: rgba(0, 0, 0, 0.3);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: #ff4444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff6666;
        }

        .hero-banner {
            position: relative;
            width: 100%;
            height: 500px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            overflow: hidden;
            margin-top: 60px;
        }

        .hero-banner-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.4) saturate(1.2);
            z-index: 0;
        }

        .hero-banner-content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 2rem;
        }

        .hero-left {
            flex: 1;
            max-width: 600px;
            color: white;
        }

        .hero-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-poster-box {
            width: 280px;
            height: 400px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(255, 68, 68, 0.3);
            border: 2px solid rgba(255, 68, 68, 0.2);
        }

        .hero-poster-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .hero-button {
            padding: 12px 32px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .hero-button-primary {
            background: #ff4444;
            color: white;
        }

        .hero-button-primary:hover {
            background: #ff6666;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 68, 68, 0.4);
        }

        .hero-button-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .hero-button-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero-title .accent {
            color: #ff4444;
        }

        .hero-desc {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .hero-banner {
                height: auto;
                min-height: 600px;
            }

            .hero-banner-content {
                flex-direction: column;
                gap: 2rem;
            }

            .hero-left {
                max-width: 100%;
                text-align: center;
            }

            .hero-title {
                font-size: 2rem;
            }

            .hero-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body class="scroll-smooth overflow-x-hidden">
    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Hero Banner Section -->
    <section class="hero-banner">
        <div id="hero-banner-bg" class="hero-banner-bg"></div>
        <div class="hero-banner-content max-w-7xl mx-auto w-full px-6">
            <div class="hero-left">
                <h1 class="hero-title">
                    Discover Your Next <span class="accent">Favorite</span> Anime
                </h1>
                <p class="hero-desc">
                    Stream thousands of anime titles in pristine quality. Explore trending shows, latest releases, and timeless classics all in one place.
                </p>
                <div class="hero-buttons">
                    <a href="episode-list.html?mal_id=3970" class="hero-button hero-button-primary">
                        Start Watching
                    </a>
                    <a href="anime-list.html" class="hero-button hero-button-secondary">
                        Browse Catalog
                    </a>
                </div>
            </div>
            <div class="hero-right">
                <div class="hero-poster-box">
                    <div id="hero-poster" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);">
                        <div class="text-center">
                            <div class="inline-block w-8 h-8 border-3 border-accent border-t-transparent rounded-full animate-spin"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="px-6 max-w-7xl mx-auto"><div class="line-divider"></div></div>

    <!-- Top Airing Section -->
    <section id="airing" class="py-20 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="mb-12">
                <h2 class="section-title text-3xl md:text-4xl font-bold text-white mb-4">
                    Top Airing Now
                </h2>
                <p class="text-gray-400 mt-2">Currently airing shows trending this season</p>
            </div>

            <div id="top-airing" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 md:gap-6">
                <!-- Skeleton Loaders -->
                <div class="anime-poster shimmer"></div>
                <div class="anime-poster shimmer"></div>
                <div class="anime-poster shimmer"></div>
                <div class="anime-poster shimmer"></div>
                <div class="anime-poster shimmer"></div>
            </div>
        </div>
    </section>

    <div class="px-6 max-w-7xl mx-auto"><div class="line-divider"></div></div>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <script>
        // Load Header
        async function loadHeader() {
            try {
                const response = await fetch('header.html');
                const headerHTML = await response.text();
                document.getElementById('header-container').innerHTML = headerHTML;
            } catch (error) {
                console.error('Error loading header:', error);
            }
        }

        // Load Footer
        async function loadFooter() {
            try {
                const response = await fetch('footer.html');
                const footerHTML = await response.text();
                document.getElementById('footer-container').innerHTML = footerHTML;
            } catch (error) {
                console.error('Error loading footer:', error);
            }
        }

        // Get anime with MAL ID 3970 for hero
        async function getFeaturedAnime() {
            try {
                const response = await fetch('https://api.jikan.moe/v4/anime/3970/full');
                const data = await response.json();
                return data.data;
            } catch (error) {
                console.error('Error fetching featured anime:', error);
                return null;
            }
        }

        // Get currently airing anime with genre 12
        async function getAiringAnimeWithGenre12() {
            let allAnime = [];
            
            for (let page = 1; page <= 3; page++) {
                try {
                    const response = await fetch(`https://api.jikan.moe/v4/anime?status=airing&order_by=score&sort=desc&limit=25&page=${page}`);
                    const data = await response.json();
                    
                    if (data.data) {
                        const filtered = data.data.filter(anime => {
                            return anime.genres && anime.genres.some(g => g.mal_id === 12);
                        });
                        allAnime.push(...filtered);
                    }
                    
                    await new Promise(resolve => setTimeout(resolve, 500));
                } catch (error) {
                    console.error('Error fetching airing anime page', page, error);
                }
            }
            
            return allAnime;
        }

        // Get AniList image for anime
        async function getAniListImage(malId) {
            try {
                const query = `
                    query {
                        Media(idMal: ${malId}, type: ANIME) {
                            coverImage {
                                large
                                medium
                            }
                            bannerImage
                        }
                    }
                `;
                
                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                
                const data = await response.json();
                return {
                    cover: data.data?.Media?.coverImage?.large || data.data?.Media?.coverImage?.medium,
                    banner: data.data?.Media?.bannerImage
                };
            } catch (error) {
                return { cover: null, banner: null };
            }
        }

        // Fetch anime data
        async function fetchAnimeData() {
            try {
                console.log('Fetching featured anime and top airing...');
                
                // Get featured anime
                const featured = await getFeaturedAnime();
                if (featured) {
                    const images = await getAniListImage(featured.mal_id);
                    
                    // Set banner background
                    const bannerUrl = images.banner || images.cover || featured.images?.jpg?.large_image_url;
                    if (bannerUrl) {
                        document.getElementById('hero-banner-bg').style.backgroundImage = `url('${bannerUrl}')`;
                    }
                    
                    // Set poster image
                    const posterUrl = images.cover || featured.images?.jpg?.large_image_url || featured.images?.jpg?.image_url;
                    const heroPoster = document.getElementById('hero-poster');
                    if (posterUrl) {
                        heroPoster.innerHTML = `
                            <img src="${posterUrl}" 
                                 alt="${featured.title}" 
                                 style="width: 100%; height: 100%; object-fit: cover; display: block;">
                        `;
                    }
                    
                    console.log('Featured anime loaded:', featured.title);
                }

                // Get top airing
                const topAiring = await getAiringAnimeWithGenre12();
                console.log('Top Airing count:', topAiring.length);
                renderAnime('top-airing', topAiring.slice(0, 5));
            } catch (error) {
                console.error('Error in fetchAnimeData:', error);
            }
        }

        async function renderAnime(containerId, animeList) {
            const container = document.getElementById(containerId);
            
            if (!animeList || animeList.length === 0) {
                container.innerHTML = '<p class="text-gray-400 col-span-full text-center py-8">No anime found</p>';
                return;
            }

            container.innerHTML = '';

            for (const anime of animeList) {
                // Get AniList image
                const images = await getAniListImage(anime.mal_id);
                const posterUrl = images.cover || anime.images?.jpg?.image_url || 'https://via.placeholder.com/300x400?text=Anime';
                
                const animeElement = document.createElement('div');
                animeElement.className = 'anime-poster group cursor-pointer';
                animeElement.innerHTML = `
                    <a href="episode-list.html?mal_id=${anime.mal_id}" class="block w-full h-full">
                        <img src="${posterUrl}" 
                             alt="${anime.title}" 
                             loading="lazy"
                             decoding="async"
                             onerror="this.src='https://via.placeholder.com/300x400?text=${encodeURIComponent(anime.title)}'">
                        <div class="anime-overlay">
                            <h3 class="text-white font-semibold text-sm line-clamp-2 mb-2">${anime.title}</h3>
                            <div class="flex justify-between items-center text-xs text-gray-300">
                                <span>⭐ ${anime.score ? anime.score.toFixed(1) : 'N/A'}</span>
                                <span>${anime.type || 'N/A'}</span>
                            </div>
                        </div>
                    </a>
                `;
                container.appendChild(animeElement);
            }
        }

        // Load everything when page loads
        document.addEventListener('DOMContentLoaded', () => {
            loadHeader();
            loadFooter();
            fetchAnimeData();
        });

        // Refresh data every 10 minutes
        setInterval(fetchAnimeData, 10 * 60 * 1000);
    </script>
</body>
</html>
